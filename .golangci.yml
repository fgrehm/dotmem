version: "2"

run:
  timeout: 3m

linters:
  enable:
    - copyloopvar
    - errcheck
    - errorlint
    - gocritic
    - govet
    - ineffassign
    - intrange
    - modernize
    - staticcheck
    - unconvert
    - unparam
    - unused
    - usetesting
  settings:
    errcheck:
      check-blank: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - linters:
          - errcheck
        source: "cmd\\.Flags\\(\\)\\."
      - linters:
          - errcheck
        source: "fmt\\.Fscan\\("
      - linters:
          - staticcheck
        text: "ST1005"
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling

formatters:
  enable:
    - gofumpt
    - goimports
