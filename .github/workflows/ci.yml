name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make test
      - run: make build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make lint
      - name: Check formatting
        run: |
          go tool golangci-lint fmt ./...
          git diff --exit-code
      - run: make deadcode
      - name: Complexity gate (gocyclo -over 30)
        run: |
          out=$(go tool gocyclo -over 30 -ignore '_test\.go$' . || true)
          if [ -n "$out" ]; then
            echo "Functions exceeding complexity threshold of 30:"
            echo "$out"
            exit 1
          fi
      - name: govulncheck
        run: make govulncheck
