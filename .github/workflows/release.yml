name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: make test

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            CHANGELOG.md | sed '/[^[:space:]]/,$!d' > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ] || ! grep -q '[^[:space:]]' /tmp/release-notes.md; then
            echo "::error::No release notes found for version ${VERSION} in CHANGELOG.md"
            exit 1
          fi

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --release-notes /tmp/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
